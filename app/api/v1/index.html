<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Администрирование пользователей</h1>

        <!-- Форма создания пользователя -->
        <div class="card">
            <h2>Создать пользователя</h2>
            <form id="createUserForm">
                <input type="text" id="adminKey" placeholder="ADMIN KEY" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="text" id="jobTitle" placeholder="Должность" required>
                <input type="text" id="fullName" placeholder="Полное имя" required>
                <input type="password" id="password" placeholder="Пароль" required>
                <button type="submit">Создать</button>
            </form>
            <div id="createResult" class="result"></div>
        </div>

        <!-- Форма аутентификации с ключом -->
        <div class="card">
            <h2>Аутентификация по ключу</h2>
            <form id="authKeyForm">
                <input type="email" id="authEmail" placeholder="Email" required>
                <input type="text" id="authKey" placeholder="Ключ (SECRET_KEY)" required>
                <button type="submit">Войти</button>
            </form>
            <div id="authResult" class="result"></div>
            <div id="userInfo" class="user-info hidden">
                <h3>Данные пользователя:</h3>
                <p><strong>ID:</strong> <span id="userId"></span></p>
                <p><strong>Email:</strong> <span id="userEmail"></span></p>
                <p><strong>Должность:</strong> <span id="userJobTitle"></span></p>
                <p><strong>Полное имя:</strong> <span id="userFullName"></span></p>
            </div>
        </div>

        <!-- Форма первого входа (смена пароля) -->
        <div class="card">
            <h2>Смена пароля при первом входе</h2>
            <form id="firstLoginForm">
                <input type="email" id="firstLoginEmail" placeholder="Email" required>
                <input type="password" id="newPassword" placeholder="Новый пароль" required>
                <button type="submit">Сменить пароль</button>
            </form>
            <div id="firstLoginResult" class="result"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
